<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Palavra para Você ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fundo vibrante com gradiente moderno e chamativo */
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #ffffff;
            padding: 20px;
            text-align: center;
            overflow-y: auto; /* Permite rolar caso a tela do celular seja pequena */
        }

        /* Cartão centralizado onde a mensagem aparece */
        .card {
            background: rgba(255, 255, 255, 0.15); /* Corrigido de 260 para 255 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
            margin: 20px 0;
        }

        /* Ícone ou detalhe no topo do cartão */
        .icon {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }

        /* Texto principal da mensagem - Super visível */
        .mensagem {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Referência do versículo ou autoria */
        .autor {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffe600; /* Amarelo vibrante para dar destaque */
            margin-bottom: 30px;
            animation: pulse 0.5s infinite;
        }

        /* Botão interativo caso a pessoa queira tirar outra palavra */
        .btn-refresh {
            background-color: #ffffff;
            color: #2575fc;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 35px;
        }

        .btn-refresh:active {
            transform: scale(0.95);
        }

        /* Seção de informações da Igreja */
        .info-igreja {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 25px;
            text-align: center;
        }

        .nome-igreja {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffe600; /* Amarelo chamativo */
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .endereco-igreja {
            font-size: 0.95rem;
            line-height: 1.4;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .cultos-igreja {
            font-size: 0.95rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 10px;
        }

        /* Animações para deixar o visual dinâmico */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

        function sortearMensagem() {
            const indiceAleatorio = Math.floor(Math.random() * mensagens.length);
            const selecao = mensagens[indiceAleatorio];
            
            // Separa o versículo bíblico da aplicação pessoal usando a barra "|"
            const partes = selecao.texto.split(" | ");
            const versiculoBiblico = partes[0];
            const aplicacaoPessoal = partes[1];

            const card = document.querySelector('.card');
            card.style.animation = 'none';
            setTimeout(() => {
                card.style.animation = 'fadeIn 0.5s ease-out';
                
                // Monta o visual estruturado: versículo normal + aplicação em itálico menor
                document.getElementById('texto-mensagem').innerHTML = `
                    "${versiculoBiblico}"
                    <div style="font-size: 1.2rem; font-weight: 500; font-style: italic; opacity: 0.9; margin-top: 15px; color: #f0f0f0;">
                        ${aplicacaoPessoal}
                    </div>
                `;
                
                document.getElementById('autor-mensagem').innerText = selecao.autor;
                document.getElementById('emoji').innerText = selecao.emoji;
            }, 50);
        }
